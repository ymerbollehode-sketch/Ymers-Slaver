<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gamleste Medlemmer – YMERS SLAVER</title>
<style>
  /* Fullskjerm blur-bakgrunn */
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: #ffffff;
    text-align: center;
    min-height: 100vh;
    position: relative;
    background: #000; /* fallback */
  }

  .bg-blur {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: url("bg.jpg.JPG") no-repeat center center fixed;
    background-size: cover;
    filter: blur(12px);
    z-index: -1;
  }

  .content {
    position: relative;
    z-index: 1;
    padding: 50px 20px;
    max-width: 800px;
    margin: 0 auto;
  }

  h1 {
    font-size: 2.5em;
    margin-bottom: 20px;
  }

  h2 {
    font-size: 2em;
    margin-bottom: 30px;
  }

  ul {
    list-style: none;
    padding: 0;
    margin: 0 auto;
    max-width: 400px;
  }

  li {
    background: rgba(0,0,0,0.25); /* glass-effekt */
    backdrop-filter: blur(4px);
    margin: 10px 0;
    padding: 15px 20px;
    border-radius: 8px;
    font-size: 1.2em;
    text-align: left;
    display: flex;
    justify-content: space-between;
  }

  .rank {
    font-weight: bold;
    color: #ffdd57; /* neon-farge for rank */
  }

  a.btn {
    display: inline-block;
    margin-top: 30px;
    padding: 10px 20px;
    color: #ffffff;
    border: 2px solid #ffffff;
    text-decoration: none;
    font-weight: bold;
    border-radius: 6px;
    transition: 0.2s;
  }

  a.btn:hover {
    background: #ffffff;
    color: #000000;
  }

  @media (max-width: 600px) {
    h1 { font-size: 2em; }
    h2 { font-size: 1.5em; }
    li { font-size: 1em; padding: 10px 15px; }
    a.btn { padding: 8px 16px; font-size: 1em; }
  }
</style>
</head>
<body>

<!-- Blur bakgrunn -->
<div class="bg-blur"></div>

<!-- Innhold over blur -->

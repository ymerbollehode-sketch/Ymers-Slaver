<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <title>Medlemmer – YMERS SLAVER</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      padding: 20px;
      line-height: 1.6em;
      text-align: center;
    }

    h1 {
      color: #5865F2;
      font-size: 2.5em;
      margin-bottom: 20px;
    }

    ul {
      list-style-type: none;
      padding: 0;
      max-width: 600px;
      margin: auto;
    }

    li {
      background: #1f2937;
      margin: 5px 0;
      padding: 10px;
      border-radius: 8px;
    }

    a.btn {
      display: inline-block;
      margin-top: 30px;
      padding: 12px 25px;
      background: #ffffff;
      color: #5865F2;
      text-decoration: none;
      font-weight: bold;
      border-radius: 8px;
      transition: 0.2s;
    }

    a.btn:hover {
      background: #ddd;
    }
  </style>
</head>
<body>
  <h1>Medlemmer – YMERS SLAVER</h1>
  <ul>
    <li>Bruker1</li>
    <li>Bruker2</li>
    <li>Bruker3</li>
    <!-- Legg til alle medlemmene her -->
  </ul>

  <a class="btn" href="index.html">← Tilbake til forsiden</a>
</body>
</html>

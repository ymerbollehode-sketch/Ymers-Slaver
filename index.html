<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ymers Slaver</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000000; /* helt svart */
      color: #ffffff;       /* lys tekst */
      text-align: center;
    }

    header, section, footer {
      background: #000000;  /* alt svart */
      padding: 50px 20px;
    }

    h1 {
      font-size: 3em;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 2em;
      margin-bottom: 20px;
    }

    p, li, a {
      font-size: 1.2em;
      color: #ffffff;  /* lys tekst */
      text-decoration: none; /* ingen farge på lenker */
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      margin: 10px 0;
    }

    .button-row {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    a.btn {
      padding: 15px 30px;
      border: 2px solid #ffffff; /* enkel hvit ramme */
      border-radius: 8px;
      font-weight: bold;
      transition: 0.2s;
      color: #ffffff;
    }

    a.btn:hover {
      background: #ffffff;
      color: #000000;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 2em;
      }
      h2 {
        font-size: 1.5em;
      }
      p, li, a.btn {
        font-size: 1em;
      }
      a.btn {
        padding: 12px 20px;
      }
    }
  </style>
</head>
<body>

<header>
  <h1>Ymers Slaver</h1>
  <p>Dette er den offisielle nettsiden til Ymers Slaver</p>
  <a class="btn" href="https://discord.gg/6Qm7d9YYQu" target="_blank">Bli medlem</a>
</header>

<section>
  <h2>Hva som skjer på serveren vår</h2>
  <ul>
    <li>🎮 Gaming</li>
    <li>💬 Chatting</li>
    <li>🎉 Events</li>
    <li>👥 Nye Folk</li>
  </ul>
</section>

<section class="button-row">
  <a class="btn" href="members.html">Medlemmer</a>
  <a class="btn" href="rules.html">Se regler</a>
</section>

<footer>
  <p>© 2026 Ymers Slaver</p>
</footer>

</body>
</html>
